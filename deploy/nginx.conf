# ============================================================
# Gualingo Nginx 配置 (Windows 版)
#
# 功能：
#   1. 托管前端静态文件（Vite 打包产物）
#   2. 反向代理 /api/ 到后端两个 PM2 实例（负载均衡）
#   3. 当一个实例正在 reload 时，自动切换到另一个实例
#
# 部署方法：
#   将此文件复制到 Nginx 的 conf 目录下替换原 nginx.conf，
#   或在原 nginx.conf 中 include 此文件。
#
# 前端静态目录：C:/nginx/html/gualingo
# 后端实例：127.0.0.1:8001 和 127.0.0.1:8002
# ============================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Gzip 压缩 ──────────────────────────────────
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── 后端负载均衡：两个 PM2 实例 ──────────────────
    # max_fails=1 fail_timeout=5s：失败 1 次后 5 秒内不再分发请求
    upstream gualingo_backend {
        server 127.0.0.1:8001 max_fails=1 fail_timeout=5s;
        server 127.0.0.1:8002 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 80;
        server_name localhost;

        # 前端静态文件根目录
        root "C:/nginx/html/gualingo";
        index index.html;

        # ── API 反向代理 ──────────────────────────────
        location /api/ {
            proxy_pass http://gualingo_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout    600s;
            proxy_connect_timeout 60s;
            # 当一个实例不可用时自动切换到另一个
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        # ── TTS 流式接口：关闭缓冲 ────────────────────
        location /api/tts/ {
            proxy_pass http://gualingo_backend;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        # ── 静态资源长缓存 ────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── SPA 前端路由 fallback ─────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
